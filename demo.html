<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpKeep Demo Request</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px 20px; }
        .container { max-width: 520px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; margin-bottom: 6px; color: #1a1a1a; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 5px; margin-top: 16px; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        textarea { resize: vertical; min-height: 70px; }
        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }
        button { width: 100%; margin-top: 24px; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #93b4f5; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
        .result.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .result.error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .result pre { white-space: pre-wrap; word-break: break-word; margin-top: 8px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Request a Demo</h1>
        <p class="subtitle">UpKeep CMMS — Speed-to-Lead Demo</p>

        <form id="demoForm">
            <div class="row">
                <div>
                    <label>First Name</label>
                    <input type="text" id="firstname" required value="Sam">
                </div>
                <div>
                    <label>Last Name</label>
                    <input type="text" id="lastname" required value="Torres">
                </div>
            </div>

            <label>Work Email</label>
            <input type="email" id="email" required value="sam@acmemanufacturing.com">

            <label>Phone Number</label>
            <input type="tel" id="phone" required placeholder="+12135551234">

            <label>Company Name</label>
            <input type="text" id="company" required value="Acme Manufacturing">

            <label>Job Title</label>
            <input type="text" id="jobtitle" required value="VP Operations">

            <label>Industry</label>
            <select id="industry">
                <option value="Manufacturing">Manufacturing</option>
                <option value="Facilities Management">Facilities Management</option>
                <option value="Property Management">Property Management</option>
                <option value="Oil & Gas">Oil & Gas</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Education">Education</option>
                <option value="Other">Other</option>
            </select>

            <label>Why are you interested in UpKeep?</label>
            <textarea id="reason" placeholder="e.g. Looking for a CMMS to replace paper-based work orders"></textarea>

            <button type="submit" id="submitBtn">Submit Demo Request</button>
        </form>

        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        document.getElementById('demoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            resultDiv.style.display = 'none';

            const payload = {
                properties: {
                    firstname: document.getElementById('firstname').value,
                    lastname: document.getElementById('lastname').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    company: document.getElementById('company').value,
                    jobtitle: document.getElementById('jobtitle').value,
                    industry: document.getElementById('industry').value,
                    reason_for_interest: document.getElementById('reason').value
                }
            };

            try {
                const start = performance.now();
                const resp = await fetch(`${API_BASE}/webhooks/hubspot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const elapsed = ((performance.now() - start) / 1000).toFixed(1);
                const data = await resp.json();

                if (resp.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `Lead scored <strong>${data.urgency_score}/10</strong> (${data.classification}) in ${elapsed}s. Sent ${data.messages_sent} messages.<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `Error: ${data.detail || JSON.stringify(data)}<pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (err) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `Network error: ${err.message}`;
            }

            resultDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Submit Demo Request';
        });
    </script>
</body>
</html>
